name: Deploy to IONOS (iwilldrive.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ionos-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifie la présence du secret SFTP
        id: gate
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          if [ -z "$SFTP_PASSWORD" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SFTP_PASSWORD absent — déploiement IONOS sauté (la démo GitHub Pages continue de fonctionner)."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node 22
        if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build (cible production iwilldrive.fr)
        if: steps.gate.outputs.ready == 'true'
        env:
          DEPLOY_TARGET: ionos
        run: |
          npm ci
          npm run build

      - name: Upload SFTP vers le webspace IONOS
        if: steps.gate.outputs.ready == 'true'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$SFTP_USER,$SFTP_PASSWORD" -p "$SFTP_PORT" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 2;
            mirror -R --delete --parallel=4 --verbose dist/ /;
            quit"
